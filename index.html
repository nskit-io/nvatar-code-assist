<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

.container { max-width: 900px; width: 100%; padding: 24px; }

/* Create layout: form left, preview right */
.create-layout { display: flex; gap: 20px; }
.create-form { flex: 1; min-width: 0; }
.create-preview { width: 320px; height: 450px; border: 1px solid #334155; border-radius: 16px; overflow: hidden; position: relative; background: #0a0f1a; flex-shrink: 0; }
.create-preview canvas { width: 100% !important; height: 100% !important; display: block; }
.preview-label { position: absolute; bottom: 8px; left: 0; right: 0; text-align: center; font-size: 11px; color: #64748b; pointer-events: none; }

@media (max-width: 768px) {
  .create-layout { flex-direction: column; }
  .create-preview { width: 100%; height: 300px; }
}

/* Header */
.logo { text-align: center; margin-bottom: 32px; }
.logo h1 { font-size: 28px; font-weight: 700; }
.logo h1 span { color: #6366f1; }
.logo p { font-size: 13px; color: #64748b; margin-top: 4px; }

/* Card */
.card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; margin-bottom: 16px; }
.card h2 { font-size: 16px; margin-bottom: 16px; }

/* Tabs */
.tabs { display: flex; border-radius: 10px; overflow: hidden; border: 1px solid #334155; margin-bottom: 20px; }
.tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; cursor: pointer; background: #0f172a; color: #94a3b8; border: none; transition: all 0.15s; }
.tab.active { background: #6366f1; color: #fff; }

/* Form */
label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 4px; margin-top: 14px; }
input, textarea, select { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; outline: none; }
input:focus, textarea:focus, select:focus { border-color: #6366f1; }
textarea { height: 70px; resize: vertical; }
.row { display: flex; gap: 10px; }
.row > div { flex: 1; }

/* VRM selector */
.vrm-section-title { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; margin-bottom: 6px; }
.vrm-scroll { max-height: 260px; overflow-y: auto; border: 1px solid #334155; border-radius: 10px; padding: 8px; }
.vrm-scroll::-webkit-scrollbar { width: 4px; }
.vrm-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
.vrm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.vrm-option { padding: 10px 6px; border: 2px solid #334155; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.15s; font-size: 11px; position: relative; }
.vrm-option:hover { border-color: #6366f1; background: rgba(99,102,241,0.05); }
.vrm-option.selected { border-color: #6366f1; background: rgba(99,102,241,0.1); }
.vrm-option .emoji { font-size: 22px; display: block; margin-bottom: 2px; }
.vrm-option .vrm-thumb { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 4px; border: 2px solid #334155; background: #0f172a; }
.avatar-thumb { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #334155; background: #0f172a; flex-shrink: 0; }
.vrm-option .vrm-name { font-weight: 600; line-height: 1.3; }
.vrm-option .vrm-creator { font-size: 9px; color: #64748b; margin-top: 2px; }
.vrm-option .vrm-badge { position: absolute; top: 4px; right: 4px; font-size: 8px; padding: 1px 5px; border-radius: 4px; background: #334155; color: #94a3b8; }
.vrm-filter { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.vrm-filter-btn { padding: 4px 10px; font-size: 11px; border: 1px solid #334155; border-radius: 6px; background: transparent; color: #94a3b8; cursor: pointer; }
.vrm-filter-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }

/* Existing list */
.avatar-list { display: flex; flex-direction: column; gap: 8px; }
.avatar-item { padding: 12px; border: 1px solid #334155; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.15s; }
.avatar-item:hover { border-color: #6366f1; background: rgba(99,102,241,0.05); }
.avatar-item .info { flex: 1; }
.avatar-item .name { font-weight: 600; font-size: 15px; }
.avatar-item .desc { font-size: 12px; color: #64748b; margin-top: 2px; }
.avatar-item .arrow { color: #64748b; font-size: 18px; }
.empty { text-align: center; color: #64748b; padding: 20px; font-size: 13px; }

/* Button */
.btn-primary { width: 100%; padding: 14px; margin-top: 20px; font-size: 15px; font-weight: 600; border: none; border-radius: 10px; background: #6366f1; color: #fff; cursor: pointer; transition: background 0.15s; }
.btn-primary:hover { background: #4f46e5; }
.btn-primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

/* Footer */
.footer { text-align: center; font-size: 11px; color: #475569; margin-top: 16px; }
.footer a { color: #6366f1; text-decoration: none; }
</style>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

// Fixed server addresses — no user override (prevents external-redirection attacks).
const SERVER = 'https://nvatar.nskit.io';
const RES_SERVER = 'https://nvatar-res.nskit.io';
function getServer() { return SERVER; }
function getResServer() { return RES_SERVER; }
let _useStaticModels = false;  // true when using local models.json fallback

// VRM models loaded from API
let allModels = [];
let selectedVRM = null;  // model object { uid, name, ... }
let currentFilter = 'all';

function getUserId() {
  let uid = localStorage.getItem('nvatar_uid');
  if (!uid) {
    uid = 'user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('nvatar_uid', uid);
  }
  return uid;
}

// --- Tabs ---
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'existing' && i === 0) || (tab === 'create' && i === 1));
  });
  document.getElementById('tabExisting').style.display = tab === 'existing' ? 'block' : 'none';
  document.getElementById('tabCreate').style.display = tab === 'create' ? 'block' : 'none';
}

// --- VRM models ---
async function loadVRMModels() {
  const server = getServer();
  const resServer = getResServer();
  const statusEl = document.getElementById('serverStatus');
  try {
    // Try resource server first
    const r = await fetch(`${resServer}/api/v1/vrm/models`, { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    allModels = d.models || [];
    _useStaticModels = false;
    if (statusEl) statusEl.textContent = `Connected to ${server}`;
    if (statusEl) statusEl.style.color = '#22c55e';
  } catch(e) {
    // Fallback to static models.json (GitHub Pages)
    try {
      const r = await fetch('./vrm/models.json');
      allModels = await r.json();
      _useStaticModels = true;
      if (statusEl) statusEl.textContent = 'Offline mode — using bundled model list';
      if (statusEl) statusEl.style.color = '#f59e0b';
    } catch(e2) {
      document.getElementById('vrmGrid').innerHTML = '<div style="grid-column:1/-1;color:#ef4444;font-size:12px;padding:12px;">Failed to load models</div>';
      return;
    }
  }
  if (allModels.length > 0) selectedVRM = allModels[0];
  renderVRMGrid();
}

function getGenderEmoji(tags) {
  if (tags.some(t => t === 'Male')) return '\u{1F468}';
  if (tags.some(t => t === 'Female')) return '\u{1F469}';
  return '\u{1F9D1}';
}

function renderVRMGrid() {
  const grid = document.getElementById('vrmGrid');
  const filtered = allModels.filter(m => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'Female') return m.tags.includes('Female');
    if (currentFilter === 'Male') return m.tags.includes('Male');
    if (currentFilter === 'booth') return m.source === 'booth';
    if (currentFilter === 'vroid') return m.source === 'vroid-samples';
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#64748b;padding:16px;font-size:12px;">No models</div>';
    return;
  }

  grid.innerHTML = filtered.map(m => {
    const modelKey = m.uid || m.id;
    const isSelected = selectedVRM && (selectedVRM.uid || selectedVRM.id) === modelKey;
    const emoji = getGenderEmoji(m.tags);
    const badge = m.source === 'booth' ? 'BOOTH' : 'VRoid';
    // Static models have relative thumbnail paths, API models have /res/... paths
    const thumbSrc = m.thumbnail ? (_useStaticModels ? m.thumbnail : `${getResServer()}${m.thumbnail}`) : null;
    const thumb = thumbSrc ? `<img class="vrm-thumb" src="${thumbSrc}" alt="${m.name}">` : `<span class="emoji">${emoji}</span>`;
    return `<div class="vrm-option${isSelected ? ' selected' : ''}" onclick="selectVRMModel('${modelKey}')">
      <span class="vrm-badge">${badge}</span>
      ${thumb}
      <div class="vrm-name">${m.name}</div>
      ${m.name_ja ? `<div class="vrm-creator">${m.name_ja}</div>` : ''}
      ${m.creator ? `<div class="vrm-creator">${m.creator}</div>` : ''}
    </div>`;
  }).join('');
}

async function resolveVRMUrl(model) {
  const uidOrUrl = model.uid || model.url || '';
  // Direct URL passthrough
  if (uidOrUrl.startsWith('http') || uidOrUrl.startsWith('/')) return uidOrUrl;
  if (!uidOrUrl) {
    // Fallback: static models have url field
    if (model.url) return (_useStaticModels ? '' : getResServer()) + model.url;
    return null;
  }
  try {
    const resp = await fetch(`${getResServer()}/api/v1/vrm/resolve/${encodeURIComponent(uidOrUrl)}`);
    if (resp.ok) {
      const data = await resp.json();
      return getResServer() + data.model.url;
    }
  } catch (e) {
    console.warn('[Lobby] VRM resolve failed:', e);
  }
  // Fallback: static models have url field
  if (model.url) return (_useStaticModels ? '' : getResServer()) + model.url;
  return null;
}

function selectVRMModel(key) {
  const model = allModels.find(m => (m.uid || m.id) === key);
  if (!model) return;
  selectedVRM = model;
  renderVRMGrid();
  resolveVRMUrl(model).then(url => { if (url) loadPreviewVRM(url); });
}

// --- Load existing ---
async function loadAvatars() {
  const uid = getUserId();
  const server = getServer();
  try {
    const r = await fetch(`${server}/api/v1/avatars?user_id=${uid}`, { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    const list = d.response || d;
    const container = document.getElementById('avatarList');

    if (!list.length) {
      container.innerHTML = '<div class="empty">아바타가 없습니다.<br>"새로 만들기" 탭에서 만들어보세요!</div>';
      return;
    }

    container.innerHTML = '';
    list.forEach(a => {
      const saved = JSON.parse(localStorage.getItem('nvatar_' + a.id) || '{}');
      const vrmUid = saved.vrm_uid || saved.vrm_slug || '';  // backward compat: fallback to vrm_slug
      const vrmName = saved.vrm_name || 'Default';
      const thumbUrl = saved.vrm_thumbnail || '';
      const thumbSrc = thumbUrl ? (thumbUrl.startsWith('http') ? thumbUrl : `${getResServer()}${thumbUrl}`) : '';
      const el = document.createElement('div');
      el.className = 'avatar-item';
      el.innerHTML = `
        ${thumbSrc ? `<img class="avatar-thumb" src="${thumbSrc}" alt="${a.name}">` : ''}
        <div class="info">
          <div class="name">${a.name}</div>
          <div class="desc">${(a.persona || '').substring(0, 50)}${(a.persona || '').length > 50 ? '...' : ''} · ${vrmName}</div>
        </div>
        <div class="arrow">\u2192</div>
      `;
      el.onclick = () => enterRoom(a.uid, vrmUid);
      container.appendChild(el);
    });
  } catch(e) {
    document.getElementById('avatarList').innerHTML = '<div class="empty">서버 연결 대기 중 — 서버 URL을 확인하세요</div>';
  }
}

// --- Create ---
async function createAndEnter() {
  const name = document.getElementById('inName').value.trim();
  const persona = document.getElementById('inPersona').value.trim();
  const tone = document.getElementById('inTone').value.trim();
  if (!name || !persona || !tone) { alert('이름, 성격, 말투를 입력하세요'); return; }

  const uid = getUserId();
  const server = getServer();
  if (!selectedVRM) { alert('외형을 선택하세요'); return; }

  const r = await fetch(`${server}/api/v1/avatars`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      user_id: uid,
      name, persona, tone,
      mbti: document.getElementById('inMbti').value || null,
      speech_style: '',
      speech_level: document.getElementById('inSpeechLevel').value,
      proactive_level: 3,
    })
  });
  const d = await r.json();
  if (d.response) {
    const avatarId = d.response.id;
    const avatarUid = d.response.uid;
    const vrmUid = selectedVRM.uid || selectedVRM.id;
    localStorage.setItem('nvatar_' + avatarId, JSON.stringify({
      vrm_uid: vrmUid,
      vrm_name: selectedVRM.name,
      vrm_thumbnail: selectedVRM.thumbnail || '',
    }));
    enterRoom(avatarUid, vrmUid);
  }
}

// --- Enter Room ---
function enterRoom(avatarUid, vrmUid) {
  const uid = vrmUid || (selectedVRM ? (selectedVRM.uid || selectedVRM.id) : '');
  if (!uid) {
    alert('VRM model not selected');
    return;
  }
  const channelUUID = (document.getElementById('channelUUID')?.value || '').trim();
  if (!channelUUID) {
    alert('Channel UUID 가 필요합니다. Gen 버튼으로 생성하고 터미널에서 채널을 시작한 뒤 입장해주세요.');
    document.getElementById('channelUUID')?.focus();
    return;
  }
  window.location.href = `code-assist.html?avatar=${avatarUid}&vrm=${encodeURIComponent(uid)}&channel=${channelUUID}`;
}

// --- 3D Preview ---
let pScene, pCamera, pRenderer, pControls, pModel, pClock;
let pIdleMixer = null;
let pIdleAction = null;

// Official Mixamo→VRM rig map (full, from pixiv/three-vrm)
const mixamoVRMRigMap = {
  mixamorigHips:'hips',mixamorigSpine:'spine',mixamorigSpine1:'chest',mixamorigSpine2:'upperChest',
  mixamorigNeck:'neck',mixamorigHead:'head',
  mixamorigLeftShoulder:'leftShoulder',mixamorigLeftArm:'leftUpperArm',mixamorigLeftForeArm:'leftLowerArm',mixamorigLeftHand:'leftHand',
  mixamorigLeftHandThumb1:'leftThumbMetacarpal',mixamorigLeftHandThumb2:'leftThumbProximal',mixamorigLeftHandThumb3:'leftThumbDistal',
  mixamorigLeftHandIndex1:'leftIndexProximal',mixamorigLeftHandIndex2:'leftIndexIntermediate',mixamorigLeftHandIndex3:'leftIndexDistal',
  mixamorigLeftHandMiddle1:'leftMiddleProximal',mixamorigLeftHandMiddle2:'leftMiddleIntermediate',mixamorigLeftHandMiddle3:'leftMiddleDistal',
  mixamorigLeftHandRing1:'leftRingProximal',mixamorigLeftHandRing2:'leftRingIntermediate',mixamorigLeftHandRing3:'leftRingDistal',
  mixamorigLeftHandPinky1:'leftLittleProximal',mixamorigLeftHandPinky2:'leftLittleIntermediate',mixamorigLeftHandPinky3:'leftLittleDistal',
  mixamorigRightShoulder:'rightShoulder',mixamorigRightArm:'rightUpperArm',mixamorigRightForeArm:'rightLowerArm',mixamorigRightHand:'rightHand',
  mixamorigRightHandThumb1:'rightThumbMetacarpal',mixamorigRightHandThumb2:'rightThumbProximal',mixamorigRightHandThumb3:'rightThumbDistal',
  mixamorigRightHandIndex1:'rightIndexProximal',mixamorigRightHandIndex2:'rightIndexIntermediate',mixamorigRightHandIndex3:'rightIndexDistal',
  mixamorigRightHandMiddle1:'rightMiddleProximal',mixamorigRightHandMiddle2:'rightMiddleIntermediate',mixamorigRightHandMiddle3:'rightMiddleDistal',
  mixamorigRightHandRing1:'rightRingProximal',mixamorigRightHandRing2:'rightRingIntermediate',mixamorigRightHandRing3:'rightRingDistal',
  mixamorigRightHandPinky1:'rightLittleProximal',mixamorigRightHandPinky2:'rightLittleIntermediate',mixamorigRightHandPinky3:'rightLittleDistal',
  mixamorigLeftUpLeg:'leftUpperLeg',mixamorigLeftLeg:'leftLowerLeg',mixamorigLeftFoot:'leftFoot',mixamorigLeftToeBase:'leftToes',
  mixamorigRightUpLeg:'rightUpperLeg',mixamorigRightLeg:'rightLowerLeg',mixamorigRightFoot:'rightFoot',mixamorigRightToeBase:'rightToes',
};

function loadMixamoForPreview(url, vrm, model) {
  const loader = new FBXLoader();
  loader.load(url, (asset) => {
    const clip = THREE.AnimationClip.findByName(asset.animations, 'mixamo.com') || asset.animations[0];
    if (!clip) return;

    const tracks = [];
    const restRotationInverse = new THREE.Quaternion();
    const parentRestWorldRotation = new THREE.Quaternion();
    const _quatA = new THREE.Quaternion();

    const motionHipsNode = asset.getObjectByName('mixamorigHips');
    const motionHipsHeight = motionHipsNode ? motionHipsNode.position.y : 1;
    const vrmHipsHeight = vrm.humanoid?.normalizedRestPose?.hips?.position?.[1] || 1;
    const hipsPositionScale = vrmHipsHeight / motionHipsHeight;

    clip.tracks.forEach((track) => {
      const trackSplitted = track.name.split('.');
      const mixamoRigName = trackSplitted[0];
      const vrmBoneName = mixamoVRMRigMap[mixamoRigName];
      const vrmNodeName = vrm.humanoid?.getNormalizedBoneNode(vrmBoneName)?.name;
      const mixamoRigNode = asset.getObjectByName(mixamoRigName);

      if (vrmNodeName != null) {
        const propertyName = trackSplitted[1];
        mixamoRigNode.getWorldQuaternion(restRotationInverse).invert();
        mixamoRigNode.parent.getWorldQuaternion(parentRestWorldRotation);

        if (track instanceof THREE.QuaternionKeyframeTrack) {
          for (let i = 0; i < track.values.length; i += 4) {
            const flatQuaternion = track.values.slice(i, i + 4);
            _quatA.fromArray(flatQuaternion);
            _quatA.premultiply(parentRestWorldRotation).multiply(restRotationInverse);
            _quatA.toArray(flatQuaternion);
            flatQuaternion.forEach((v, index) => { track.values[index + i] = v; });
          }
          tracks.push(new THREE.QuaternionKeyframeTrack(
            `${vrmNodeName}.${propertyName}`, track.times,
            track.values.map((v, i) => (vrm.meta?.metaVersion === '0' && i % 2 === 0 ? -v : v)),
          ));
        }
      }
    });

    const filteredTracks = tracks.filter(t => !t.name.endsWith('.position'));
    const idleClip = new THREE.AnimationClip('idle', clip.duration, filteredTracks);

    pIdleMixer = new THREE.AnimationMixer(model);
    pIdleAction = pIdleMixer.clipAction(idleClip);
    pIdleAction.play();
    if (pModel) pModel.visible = true;
    console.log(`[Preview] Idle loaded (${filteredTracks.length} tracks)`);
  }, undefined, (err) => {
    console.warn('[Preview] FBX load failed, using manual pose fallback');
    _applyManualIdlePose(vrm);
    if (pModel) pModel.visible = true;
  });
}

// Post-animation arm spread adjustment (prevents arms clipping into body)
function _adjustArmSpread(vrm) {
  const h = vrm.humanoid;
  if (!h) return;
  const L = h.getNormalizedBoneNode('leftUpperArm');
  const R = h.getNormalizedBoneNode('rightUpperArm');
  if (L) { L.rotation.z -= 0.15; L.rotation.x += 0.05; }   // ~9° outward, ~3° forward
  if (R) { R.rotation.z += 0.15; R.rotation.x += 0.05; }
}

function _applyManualIdlePose(vrm) {
  const h = vrm.humanoid;
  if (!h) return;
  const DEG = Math.PI / 180;
  const poses = {
    leftUpperArm: { z: 65 * DEG }, rightUpperArm: { z: -65 * DEG },
    leftLowerArm: { z: 3 * DEG }, rightLowerArm: { z: -3 * DEG },
  };
  for (const [boneName, rot] of Object.entries(poses)) {
    const node = h.getNormalizedBoneNode(boneName);
    if (node && rot.z) node.rotation.z = rot.z;
  }
}

function initPreview() {
  if (pRenderer) return;
  const container = document.getElementById('previewContainer');
  pClock = new THREE.Clock();

  pScene = new THREE.Scene();
  pScene.background = new THREE.Color(0x0a0f1a);

  pCamera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.1, 100);
  pCamera.position.set(0, 1.2, 3);

  pRenderer = new THREE.WebGLRenderer({ antialias: true });
  pRenderer.setSize(container.clientWidth, container.clientHeight);
  pRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  pRenderer.outputColorSpace = THREE.SRGBColorSpace;
  container.appendChild(pRenderer.domElement);

  pScene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(2, 3, 2);
  pScene.add(dir);

  pControls = new OrbitControls(pCamera, pRenderer.domElement);
  pControls.target.set(0, 1, 0);
  pControls.enableDamping = true;
  pControls.enableZoom = false;

  document.getElementById('previewPlaceholder').style.display = 'none';

  new ResizeObserver(() => {
    const w = container.clientWidth, h = container.clientHeight;
    if (w > 0 && h > 0 && pRenderer) {
      pCamera.aspect = w / h;
      pCamera.updateProjectionMatrix();
      pRenderer.setSize(w, h);
    }
  }).observe(container);

  (function animateP() {
    requestAnimationFrame(animateP);
    const delta = pClock.getDelta();
    if (pControls) pControls.update();
    if (pIdleMixer) { pIdleMixer.update(delta); if (pModel && pModel._vrm) _adjustArmSpread(pModel._vrm); }
    if (pModel && pModel._vrm) pModel._vrm.update(delta);
    if (pRenderer) pRenderer.render(pScene, pCamera);
  })();
}

function applyIdlePose(vrm, model) {
  loadMixamoForPreview(`${getResServer()}/res/fbx/mixamo/Idle_Default.fbx`, vrm, model);
}

async function loadPreviewVRM(url) {
  initPreview();
  try {
    const vrmModule = await import('https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js');
    const { VRMLoaderPlugin } = vrmModule;
    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));

    if (pModel) pScene.remove(pModel);
    if (pIdleMixer) { pIdleMixer.stopAllAction(); pIdleMixer = null; }

    loader.load(url, (gltf) => {
      pModel = gltf.scene;
      pModel._vrm = gltf.userData.vrm;
      pModel.rotation.y = 0;
      pModel.visible = false;
      pScene.add(pModel);
      applyIdlePose(gltf.userData.vrm, pModel);
    });
  } catch(e) { console.error('Preview:', e); }
}

// Expose functions to HTML onclick
window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'existing' && i === 0) || (tab === 'create' && i === 1));
  });
  document.getElementById('tabExisting').style.display = tab === 'existing' ? 'block' : 'none';
  document.getElementById('tabCreate').style.display = tab === 'create' ? 'block' : 'none';
  if (tab === 'create') {
    requestAnimationFrame(() => setTimeout(() => {
      if (!pRenderer && selectedVRM) resolveVRMUrl(selectedVRM).then(url => { if (url) loadPreviewVRM(url); });
    }, 200));
  }
};

window.selectVRMModel = function(key) {
  const model = allModels.find(m => (m.uid || m.id) === key);
  if (!model) return;
  selectedVRM = model;
  renderVRMGrid();
  resolveVRMUrl(model).then(url => { if (url) loadPreviewVRM(url); });
};

window.filterVRM = function(filter) {
  currentFilter = filter;
  document.querySelectorAll('.vrm-filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === filter || (filter === 'all' && b.textContent === 'All'));
  });
  renderVRMGrid();
};

window.createAndEnter = createAndEnter;

// Init
loadAvatars();
loadVRMModels();
